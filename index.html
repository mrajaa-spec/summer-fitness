<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>☀️ Summer Weight Loss Challenge</title>
  <meta name="description" content="Pallavi, Ashwini & Murali's summer fitness tracker" />
  <meta property="og:title" content="☀️ Summer Weight Loss Challenge" />
  <meta property="og:description" content="Track daily calorie goals and weekly weight progress" />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── VARIABLES ─────────────────────────────────────────── */
    :root {
      --green:   #06D6A0;
      --amber:   #FFD166;
      --red:     #EF476F;
      --bg1:     #FF6B35;
      --bg2:     #FFD166;
      --bg3:     #06D6A0;
      --bg4:     #118AB2;
      --surface: rgba(255,255,255,0.12);
      --surface2: rgba(255,255,255,0.22);
      --text:    #1a1a2e;
      --text-light: rgba(255,255,255,0.92);
      --radius:  18px;
      --shadow:  0 8px 32px rgba(0,0,0,0.18);
    }

    /* ─── RESET / BASE ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 35%, var(--bg3) 70%, var(--bg4) 100%);
      background-attachment: fixed;
      color: var(--text-light);
      overflow-x: hidden;
      padding-bottom: 40px;
    }

    /* ─── ANIMATED BG BLOBS ─────────────────────────────────── */
    .blob-wrap { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.35;
      animation: blobFloat 12s ease-in-out infinite;
    }
    .blob-1 { width: 340px; height: 340px; background: #FF6B35; top: -80px; left: -60px; animation-delay: 0s; }
    .blob-2 { width: 280px; height: 280px; background: #06D6A0; bottom: 0; right: -40px; animation-delay: -4s; }
    .blob-3 { width: 200px; height: 200px; background: #FFD166; top: 40%; left: 30%; animation-delay: -8s; }

    @keyframes blobFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(30px, -20px) scale(1.08); }
      66%       { transform: translate(-20px, 15px) scale(0.95); }
    }

    /* ─── FLOATERS ──────────────────────────────────────────── */
    .floaters { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .floater {
      position: absolute;
      font-size: 1.6rem;
      animation: floatUp 10s ease-in infinite;
      opacity: 0;
    }
    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0) rotate(0deg); }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.5; }
      100% { opacity: 0; transform: translateY(-110vh) rotate(360deg); }
    }

    /* ─── LAYOUT ────────────────────────────────────────────── */
    #app {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 14px;
    }

    /* ─── HEADER ────────────────────────────────────────────── */
    .header {
      text-align: center;
      padding: 32px 0 18px;
    }
    .header-sun {
      font-size: 3rem;
      display: inline-block;
      animation: sunSpin 6s linear infinite;
    }
    @keyframes sunSpin {
      0%   { transform: rotate(0deg) scale(1); }
      50%  { transform: rotate(180deg) scale(1.15); }
      100% { transform: rotate(360deg) scale(1); }
    }
    .header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.5rem, 6vw, 2rem);
      line-height: 1.2;
      text-shadow: 0 2px 12px rgba(0,0,0,0.25);
      margin-top: 6px;
    }
    .header p {
      font-size: 0.82rem;
      opacity: 0.85;
      margin-top: 4px;
    }

    /* ─── QUOTE TICKER ──────────────────────────────────────── */
    .quote-bar {
      background: var(--surface);
      backdrop-filter: blur(10px);
      border-radius: 50px;
      padding: 8px 18px;
      text-align: center;
      font-size: 0.78rem;
      font-weight: 500;
      margin-bottom: 18px;
      border: 1px solid rgba(255,255,255,0.25);
      animation: shimmer 4s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.85; }
      50%       { opacity: 1; }
    }

    /* ─── SECTION TITLE ─────────────────────────────────────── */
    .section-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.15rem;
      margin: 22px 0 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ─── PERSON CARD ───────────────────────────────────────── */
    .person-card {
      background: var(--surface);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      transition: transform 0.2s;
    }
    .person-card:active { transform: scale(0.98); }

    .person-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .person-info { display: flex; align-items: center; gap: 10px; }
    .person-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      border: 2px solid rgba(255,255,255,0.4);
    }
    .person-name {
      font-family: 'Fredoka One', cursive;
      font-size: 1.15rem;
    }
    .person-pts {
      font-size: 0.7rem;
      opacity: 0.8;
      margin-top: 1px;
    }
    .streak-badge {
      font-size: 0.8rem;
      background: rgba(255,255,255,0.18);
      border-radius: 50px;
      padding: 4px 10px;
      font-weight: 600;
    }
    .streak-badge.on-fire {
      background: linear-gradient(135deg, #FF6B35, #FFD166);
      animation: streakPulse 1s ease-in-out infinite;
      color: #1a1a2e;
    }
    @keyframes streakPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,53,0.5); }
      50%       { box-shadow: 0 0 0 8px rgba(255,107,53,0); }
    }

    /* ─── RAG BUTTONS ───────────────────────────────────────── */
    .rag-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .rag-btn {
      border: none;
      border-radius: 12px;
      padding: 12px 6px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #1a1a2e;
    }
    .rag-btn:active { transform: scale(0.93); }
    .rag-btn .rag-icon { font-size: 1.5rem; }
    .rag-btn.green  { background: var(--green); }
    .rag-btn.amber  { background: var(--amber); }
    .rag-btn.red    { background: var(--red); color: #fff; }
    .rag-btn.selected { box-shadow: 0 0 0 3px white, 0 0 0 5px rgba(255,255,255,0.4); transform: scale(1.04); }
    .rag-btn.dimmed { opacity: 0.35; cursor: default; }

    /* ─── TODAY DONE BANNER ─────────────────────────────────── */
    .done-banner {
      text-align: center;
      padding: 10px;
      background: rgba(6,214,160,0.25);
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      border: 1px solid rgba(6,214,160,0.5);
    }

    /* ─── FEEDBACK MSG ──────────────────────────────────────── */
    .feedback-msg {
      text-align: center;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 8px 0 2px;
      min-height: 26px;
      transition: all 0.3s;
    }

    /* ─── WEEK STRIP ────────────────────────────────────────── */
    .week-strip-card {
      background: var(--surface);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }
    .week-strip-person {
      margin-bottom: 10px;
    }
    .week-strip-person:last-child { margin-bottom: 0; }
    .strip-label {
      font-size: 0.72rem;
      font-weight: 600;
      opacity: 0.8;
      margin-bottom: 5px;
    }
    .strip-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .strip-day {
      border-radius: 6px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.58rem;
      font-weight: 600;
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5);
    }
    .strip-day.green { background: var(--green); color: #1a1a2e; }
    .strip-day.amber { background: var(--amber); color: #1a1a2e; }
    .strip-day.red   { background: var(--red);   color: #fff; }
    .strip-day.today { border: 2px solid white; color: white; }

    /* ─── LEADERBOARD ───────────────────────────────────────── */
    .leaderboard-card {
      background: var(--surface);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }
    .podium {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 10px;
      margin: 14px 0 8px;
    }
    .podium-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .podium-avatar { font-size: 1.6rem; }
    .podium-name {
      font-size: 0.72rem;
      font-weight: 600;
    }
    .podium-pts {
      font-size: 0.68rem;
      opacity: 0.8;
    }
    .podium-block {
      border-radius: 8px 8px 0 0;
      width: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fredoka One', cursive;
      font-size: 1.2rem;
      color: #1a1a2e;
    }
    .podium-block.p1 { height: 70px; background: linear-gradient(180deg, #FFD700, #FFA500); }
    .podium-block.p2 { height: 50px; background: linear-gradient(180deg, #E0E0E0, #BDBDBD); }
    .podium-block.p3 { height: 36px; background: linear-gradient(180deg, #CD7F32, #A0522D); }

    /* ─── WEIGHT SECTION ────────────────────────────────────── */
    .weight-card {
      background: var(--surface);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }
    .weight-person {
      margin-bottom: 16px;
    }
    .weight-person:last-child { margin-bottom: 0; }
    .weight-person-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .weight-name {
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .weight-target {
      font-size: 0.7rem;
      opacity: 0.75;
    }
    .progress-track {
      height: 12px;
      background: rgba(255,255,255,0.15);
      border-radius: 50px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .progress-fill {
      height: 100%;
      border-radius: 50px;
      background: linear-gradient(90deg, var(--green), #118AB2);
      transition: width 1s cubic-bezier(0.4,0,0.2,1);
      position: relative;
      overflow: hidden;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.35) 50%, transparent 100%);
      animation: progressShine 2s ease-in-out infinite;
    }
    @keyframes progressShine {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }
    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      opacity: 0.75;
    }
    .weight-input-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      align-items: center;
    }
    .weight-input {
      flex: 1;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 10px;
      padding: 9px 12px;
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      outline: none;
    }
    .weight-input::placeholder { color: rgba(255,255,255,0.5); }
    .weight-input:focus { border-color: rgba(255,255,255,0.65); background: rgba(255,255,255,0.2); }
    .weight-save-btn {
      background: rgba(255,255,255,0.25);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 10px;
      color: white;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.82rem;
      padding: 9px 14px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .weight-save-btn:hover { background: rgba(255,255,255,0.35); }

    /* ─── SETTINGS BUTTON ───────────────────────────────────── */
    .settings-btn {
      display: block;
      width: 100%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 12px;
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 11px;
      cursor: pointer;
      text-align: center;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .settings-btn:hover { background: rgba(255,255,255,0.2); }

    /* ─── MODAL ─────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.25s ease;
    }
    .modal-overlay.hidden { display: none; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: linear-gradient(135deg, #1a1a3e 0%, #16213e 100%);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 22px;
      padding: 26px 22px;
      width: 100%;
      max-width: 400px;
      max-height: 88vh;
      overflow-y: auto;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
      animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal h2 {
      font-family: 'Fredoka One', cursive;
      font-size: 1.4rem;
      text-align: center;
      margin-bottom: 6px;
      color: white;
    }
    .modal p { font-size: 0.8rem; opacity: 0.7; text-align: center; margin-bottom: 20px; color: white; }

    .modal-person {
      margin-bottom: 18px;
      padding: 14px;
      background: rgba(255,255,255,0.07);
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .modal-person-name {
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 10px;
      color: white;
    }
    .modal-field {
      margin-bottom: 8px;
    }
    .modal-field label {
      display: block;
      font-size: 0.72rem;
      opacity: 0.75;
      margin-bottom: 4px;
      color: white;
    }
    .modal-input {
      width: 100%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 10px;
      padding: 9px 12px;
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      outline: none;
    }
    .modal-input:focus { border-color: var(--green); background: rgba(255,255,255,0.15); }

    .modal-save-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--green), #118AB2);
      border: none;
      border-radius: 14px;
      color: #1a1a2e;
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      padding: 14px;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 16px rgba(6,214,160,0.4);
    }
    .modal-save-btn:active { transform: scale(0.97); }

    /* ─── CONFETTI ───────────────────────────────────────────── */
    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 999;
      animation: confettiFall var(--dur) ease-in forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translate(0, 0) rotate(0deg); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)); opacity: 0; }
    }

    /* ─── TOAST ─────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(26,26,46,0.95);
      color: white;
      border-radius: 50px;
      padding: 12px 22px;
      font-size: 0.85rem;
      font-weight: 600;
      z-index: 200;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s;
      opacity: 0;
      border: 1px solid rgba(255,255,255,0.2);
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ─── FOOTER ────────────────────────────────────────────── */
    .footer {
      text-align: center;
      padding: 24px 0 8px;
      font-size: 0.7rem;
      opacity: 0.55;
    }
  </style>
</head>
<body>

<!-- Animated background -->
<div class="blob-wrap">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>
<div class="floaters" id="floaters"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Setup / Settings modal -->
<div class="modal-overlay hidden" id="settingsModal">
  <div class="modal">
    <h2>⚙️ Challenge Setup</h2>
    <p>Set start weight and target weight for each participant (in kg or lbs — just be consistent!)</p>

    <div class="modal-person">
      <div class="modal-person-name">🌸 Pallavi</div>
      <div class="modal-field">
        <label>Start weight</label>
        <input class="modal-input" type="number" step="0.1" id="s-pallavi-start" placeholder="e.g. 72.0" />
      </div>
      <div class="modal-field">
        <label>Target weight</label>
        <input class="modal-input" type="number" step="0.1" id="s-pallavi-target" placeholder="e.g. 65.0" />
      </div>
    </div>

    <div class="modal-person">
      <div class="modal-person-name">🌺 Ashwini</div>
      <div class="modal-field">
        <label>Start weight</label>
        <input class="modal-input" type="number" step="0.1" id="s-ashwini-start" placeholder="e.g. 68.0" />
      </div>
      <div class="modal-field">
        <label>Target weight</label>
        <input class="modal-input" type="number" step="0.1" id="s-ashwini-target" placeholder="e.g. 62.0" />
      </div>
    </div>

    <div class="modal-person">
      <div class="modal-person-name">🦁 Murali</div>
      <div class="modal-field">
        <label>Start weight</label>
        <input class="modal-input" type="number" step="0.1" id="s-murali-start" placeholder="e.g. 85.0" />
      </div>
      <div class="modal-field">
        <label>Target weight</label>
        <input class="modal-input" type="number" step="0.1" id="s-murali-target" placeholder="e.g. 78.0" />
      </div>
    </div>

    <button class="modal-save-btn" id="modalSaveBtn">🚀 Start the Challenge!</button>
  </div>
</div>

<!-- Main app -->
<div id="app">

  <!-- Header -->
  <div class="header">
    <div class="header-sun">☀️</div>
    <h1>Summer Weight Loss<br>Challenge</h1>
    <p id="dateDisplay"></p>
  </div>

  <!-- Daily quote -->
  <div class="quote-bar" id="quoteBar"></div>

  <!-- Today's check-in -->
  <div class="section-title">🥗 Today's Check-In</div>
  <div id="checkinSection"></div>

  <!-- This week strip -->
  <div class="section-title">📅 This Week</div>
  <div class="week-strip-card" id="weekStrip"></div>

  <!-- Leaderboard -->
  <div class="section-title">🏆 Leaderboard</div>
  <div class="leaderboard-card" id="leaderboard"></div>

  <!-- Weekly weight -->
  <div class="section-title">⚖️ Weekly Weigh-In</div>
  <div class="weight-card" id="weightSection"></div>

  <!-- Settings -->
  <button class="settings-btn" id="openSettings">⚙️ Edit Setup / Targets</button>

  <div class="footer">Summer 2026 · Stay strong, family! 💪</div>
</div>

<script>
// ─── CONSTANTS ─────────────────────────────────────────────────
const PEOPLE = [
  { id: 'pallavi', name: 'Pallavi', emoji: '🌸' },
  { id: 'ashwini', name: 'Ashwini', emoji: '🌺' },
  { id: 'murali',  name: 'Murali',  emoji: '🦁' }
];

const QUOTES = [
  '💪 Every green day is a step closer to your goal!',
  '🌟 Progress, not perfection. Keep going!',
  '🥗 You are what you eat — make it count today!',
  '🔥 Consistency beats intensity every time.',
  '🌈 Small steps every day lead to big changes.',
  '🏃 The only bad workout is the one that didn\'t happen.',
  '🍉 Summer bodies are made in spring — and today!',
  '⭐ You\'ve got this, family! Support each other!',
  '🌿 Nourish your body, love yourself.',
  '🎯 Stay focused. Your future self will thank you.',
  '🌊 Ride the wave of momentum!',
  '🦋 Transformation takes time — trust the process.',
];

const MESSAGES = {
  green: ['🎉 Amazing! Crushed it today!', '🌟 Green day — you\'re on fire!', '💚 Perfect! Keep that streak going!', '🥗 Healthy choices = healthy body!'],
  amber: ['👍 Good effort! Aim for green tomorrow!', '🌤️ Almost there — little more focus!', '💛 Amber today, green tomorrow!'],
  red: ['❤️ Tomorrow is a fresh start!', '💪 Don\'t give up — every day is new!', '🌱 Acknowledge, reset, come back stronger!'],
};

// ─── DATA LAYER ─────────────────────────────────────────────────
const STORE_KEY = 'swlc_data';

function loadData() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    settings: {
      pallavi: { startWeight: null, targetWeight: null },
      ashwini: { startWeight: null, targetWeight: null },
      murali:  { startWeight: null, targetWeight: null }
    },
    daily: {},
    weekly: {}
  };
}

function saveData(data) {
  localStorage.setItem(STORE_KEY, JSON.stringify(data));
}

let DATA = loadData();

// ─── DATE UTILITIES ─────────────────────────────────────────────
function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function weekKey(date) {
  const d = date ? new Date(date) : new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${String(week).padStart(2, '0')}`;
}

function getWeekDays() {
  const today = new Date();
  const dow = today.getDay(); // 0=Sun
  const monday = new Date(today);
  monday.setDate(today.getDate() - ((dow + 6) % 7));
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    days.push(d.toISOString().slice(0, 10));
  }
  return days;
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
}

function dayLabel(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-GB', { weekday: 'short' }).slice(0, 2);
}

// ─── SCORING ────────────────────────────────────────────────────
const RAG_PTS = { green: 3, amber: 1, red: 0 };

function totalPoints(personId) {
  let pts = 0;
  for (const dayData of Object.values(DATA.daily)) {
    const status = dayData[personId];
    if (status) pts += RAG_PTS[status] || 0;
  }
  const settings = DATA.settings[personId];
  if (settings && settings.startWeight && settings.targetWeight) {
    for (const weekData of Object.values(DATA.weekly)) {
      const w = weekData[personId];
      if (w != null) {
        const totalLoss = settings.startWeight - settings.targetWeight;
        const achieved = settings.startWeight - w;
        if (achieved >= totalLoss * 0.25) pts += 5;
      }
    }
  }
  return pts;
}

function currentStreak(personId) {
  const today = todayStr();
  let streak = 0;
  let d = new Date();
  while (true) {
    const key = d.toISOString().slice(0, 10);
    if (key > today) { d.setDate(d.getDate() - 1); continue; }
    const status = (DATA.daily[key] || {})[personId];
    if (status === 'green') {
      streak++;
      d.setDate(d.getDate() - 1);
    } else {
      break;
    }
    if (streak > 365) break;
  }
  return streak;
}

// ─── RENDER HELPERS ─────────────────────────────────────────────
function randChoice(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function weightProgress(personId) {
  const s = DATA.settings[personId];
  if (!s || !s.startWeight || !s.targetWeight) return { pct: 0, current: null, start: s?.startWeight, target: s?.targetWeight };
  const weeks = Object.keys(DATA.weekly).sort().reverse();
  let current = null;
  for (const w of weeks) {
    if (DATA.weekly[w][personId] != null) { current = DATA.weekly[w][personId]; break; }
  }
  if (!current) current = s.startWeight;
  const totalLoss = s.startWeight - s.targetWeight;
  if (totalLoss <= 0) return { pct: 100, current, start: s.startWeight, target: s.targetWeight };
  const achieved = s.startWeight - current;
  const pct = Math.min(100, Math.max(0, Math.round((achieved / totalLoss) * 100)));
  return { pct, current, start: s.startWeight, target: s.targetWeight };
}

// ─── RENDER FUNCTIONS ───────────────────────────────────────────

function renderCheckin() {
  const today = todayStr();
  const todayData = DATA.daily[today] || {};
  let html = '';

  for (const p of PEOPLE) {
    const status = todayData[p.id];
    const streak = currentStreak(p.id);
    const pts = totalPoints(p.id);
    const done = !!status;

    let ragHtml = '';
    if (done) {
      ragHtml = `<div class="done-banner">✅ Logged as <strong>${status.charAt(0).toUpperCase() + status.slice(1)}</strong> today!</div>`;
    } else {
      const btns = ['green','amber','red'].map(r => {
        const icons = { green: '🟢', amber: '🟡', red: '🔴' };
        const labels = { green: 'On track', amber: 'Okay-ish', red: 'Struggled' };
        return `<button class="rag-btn ${r}" data-person="${p.id}" data-status="${r}" onclick="logRag('${p.id}','${r}')">
          <span class="rag-icon">${icons[r]}</span>${labels[r]}
        </button>`;
      }).join('');
      ragHtml = `<div class="rag-buttons">${btns}</div>`;
    }

    const streakClass = streak >= 3 ? 'streak-badge on-fire' : 'streak-badge';
    const streakText = streak >= 3 ? `🔥 ${streak} day streak!` : streak > 0 ? `🔥 ${streak}` : '—';

    html += `<div class="person-card">
      <div class="person-header">
        <div class="person-info">
          <div class="person-avatar">${p.emoji}</div>
          <div>
            <div class="person-name">${p.name}</div>
            <div class="person-pts">⭐ ${pts} pts total</div>
          </div>
        </div>
        <div class="${streakClass}">${streakText}</div>
      </div>
      ${ragHtml}
      <div class="feedback-msg" id="feedback-${p.id}"></div>
    </div>`;
  }

  document.getElementById('checkinSection').innerHTML = html;
}

function renderWeekStrip() {
  const days = getWeekDays();
  const today = todayStr();
  let html = '';

  for (const p of PEOPLE) {
    const daysHtml = days.map(d => {
      const status = (DATA.daily[d] || {})[p.id];
      const isToday = d === today;
      let cls = 'strip-day';
      if (status) cls += ` ${status}`;
      if (isToday) cls += ' today';
      return `<div class="${cls}" title="${d}">${dayLabel(d)}</div>`;
    }).join('');
    html += `<div class="week-strip-person">
      <div class="strip-label">${p.emoji} ${p.name}</div>
      <div class="strip-days">${daysHtml}</div>
    </div>`;
  }

  document.getElementById('weekStrip').innerHTML = html;
}

function renderLeaderboard() {
  const ranked = PEOPLE.map(p => ({ ...p, pts: totalPoints(p.id), streak: currentStreak(p.id) }))
    .sort((a, b) => b.pts - a.pts);

  const medals = ['🥇', '🥈', '🥉'];
  const podiumOrder = [ranked[1], ranked[0], ranked[2]];
  const podiumClass = ['p2', 'p1', 'p3'];

  const podiumHtml = podiumOrder.map((p, i) => {
    if (!p) return '';
    const rank = ranked.indexOf(p);
    return `<div class="podium-slot">
      <div class="podium-avatar">${p.emoji}</div>
      <div class="podium-name">${p.name}</div>
      <div class="podium-pts">${p.pts} pts</div>
      <div class="podium-block ${podiumClass[i]}">${medals[rank]}</div>
    </div>`;
  }).join('');

  document.getElementById('leaderboard').innerHTML = `<div class="podium">${podiumHtml}</div>`;
}

function renderWeightSection() {
  const wk = weekKey();
  const weeklyData = DATA.weekly[wk] || {};
  let html = '';

  for (const p of PEOPLE) {
    const prog = weightProgress(p.id);
    const currentWeekVal = weeklyData[p.id] != null ? weeklyData[p.id] : '';
    const startLabel = prog.start ? `Start: ${prog.start}` : 'Start: ?';
    const targetLabel = prog.target ? `Target: ${prog.target}` : 'Target: ?';

    html += `<div class="weight-person">
      <div class="weight-person-header">
        <div class="weight-name">${p.emoji} ${p.name}</div>
        <div class="weight-target">${prog.pct}% to goal</div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="prog-${p.id}" style="width:${prog.pct}%"></div>
      </div>
      <div class="progress-labels">
        <span>${startLabel}</span>
        <span>${targetLabel}</span>
      </div>
      <div class="weight-input-row">
        <input class="weight-input" type="number" step="0.1" id="w-${p.id}"
          value="${currentWeekVal}" placeholder="This week's weight" />
        <button class="weight-save-btn" onclick="saveWeight('${p.id}')">Save ⚖️</button>
      </div>
    </div>`;
  }

  document.getElementById('weightSection').innerHTML = html;
}

// ─── ACTIONS ────────────────────────────────────────────────────

function logRag(personId, status) {
  const today = todayStr();
  if (!DATA.daily[today]) DATA.daily[today] = {};
  const prev = DATA.daily[today][personId];
  if (prev) return;
  DATA.daily[today][personId] = status;
  saveData(DATA);

  if (status === 'green') fireConfetti();
  const msg = randChoice(MESSAGES[status]);
  const el = document.getElementById(`feedback-${personId}`);
  if (el) { el.textContent = msg; }

  showToast(msg);
  renderCheckin();
  renderWeekStrip();
  renderLeaderboard();
}

function saveWeight(personId) {
  const input = document.getElementById(`w-${personId}`);
  const val = parseFloat(input.value);
  if (isNaN(val) || val <= 0) { showToast('⚠️ Please enter a valid weight'); return; }

  const wk = weekKey();
  if (!DATA.weekly[wk]) DATA.weekly[wk] = {};
  const prev = DATA.weekly[wk][personId];
  DATA.weekly[wk][personId] = val;
  saveData(DATA);

  const s = DATA.settings[personId];
  if (s && s.targetWeight && val <= s.targetWeight) {
    fireConfetti();
    showToast('🎉 TARGET REACHED! Incredible!!!');
  } else if (prev && val < prev) {
    showToast(`📉 Down ${(prev - val).toFixed(1)} from last week — keep going!`);
  } else {
    showToast('⚖️ Weight logged!');
  }

  renderWeightSection();
  renderLeaderboard();
}

// ─── SETTINGS MODAL ─────────────────────────────────────────────

function openSettings() {
  for (const p of PEOPLE) {
    const s = DATA.settings[p.id];
    if (s.startWeight)  document.getElementById(`s-${p.id}-start`).value  = s.startWeight;
    if (s.targetWeight) document.getElementById(`s-${p.id}-target`).value = s.targetWeight;
  }
  document.getElementById('settingsModal').classList.remove('hidden');
}

function saveSettings() {
  for (const p of PEOPLE) {
    const start  = parseFloat(document.getElementById(`s-${p.id}-start`).value);
    const target = parseFloat(document.getElementById(`s-${p.id}-target`).value);
    if (!isNaN(start) && start > 0)   DATA.settings[p.id].startWeight  = start;
    if (!isNaN(target) && target > 0) DATA.settings[p.id].targetWeight = target;
  }
  saveData(DATA);
  document.getElementById('settingsModal').classList.add('hidden');
  renderAll();
  showToast('✅ Settings saved!');
}

// ─── TOAST ──────────────────────────────────────────────────────

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── CONFETTI ───────────────────────────────────────────────────

function fireConfetti() {
  const colors = ['#06D6A0','#FFD166','#EF476F','#118AB2','#FF6B35','#ffffff'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const x = Math.random() * window.innerWidth;
    const dx = (Math.random() - 0.5) * 400;
    const dy = Math.random() * 600 + 300;
    const rot = Math.random() * 720 - 360;
    const dur = (Math.random() * 0.8 + 0.8).toFixed(2);
    const size = Math.random() * 8 + 6;
    el.style.cssText = `
      left:${x}px; top: -10px;
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --dx:${dx}px; --dy:${dy}px; --rot:${rot}deg; --dur:${dur}s;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), parseFloat(dur) * 1000 + 100);
  }
}

// ─── FLOATING EMOJIS ────────────────────────────────────────────

function spawnFloaters() {
  const emojis = ['🍉','💪','🥗','🏃','🌟','🔥','🥦','🌊','⚡','🎯','🌿','🍋'];
  const wrap = document.getElementById('floaters');
  function spawn() {
    const el = document.createElement('div');
    el.className = 'floater';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = Math.random() * 95 + '%';
    el.style.bottom = '-40px';
    el.style.animationDuration = (Math.random() * 8 + 8) + 's';
    el.style.animationDelay = (Math.random() * 2) + 's';
    el.style.fontSize = (Math.random() * 1.2 + 1) + 'rem';
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 18000);
  }
  spawn();
  setInterval(spawn, 2200);
}

// ─── RENDER ALL ──────────────────────────────────────────────────

function renderAll() {
  renderCheckin();
  renderWeekStrip();
  renderLeaderboard();
  renderWeightSection();
}

// ─── INIT ────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('dateDisplay').textContent = formatDate(todayStr());

  const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
  document.getElementById('quoteBar').textContent = QUOTES[dayOfYear % QUOTES.length];

  document.getElementById('modalSaveBtn').addEventListener('click', saveSettings);
  document.getElementById('openSettings').addEventListener('click', openSettings);

  document.getElementById('settingsModal').addEventListener('click', e => {
    if (e.target === document.getElementById('settingsModal')) {
      document.getElementById('settingsModal').classList.add('hidden');
    }
  });

  renderAll();
  spawnFloaters();

  const hasSettings = PEOPLE.some(p => DATA.settings[p.id].startWeight);
  if (!hasSettings) openSettings();
});
</script>
